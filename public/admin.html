<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админ-панель — Угадай Футболиста</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; color: #fff; font-family: 'Inter', sans-serif; padding: 20px; }
    h1 { margin-bottom: 20px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; max-width: 1400px; }
    .card { background: #16213e; border-radius: 12px; padding: 20px; }
    .card h2 { margin-bottom: 16px; color: #00ff88; }
    button { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; transition: all 0.2s; }
    button:hover { opacity: 0.8; }
    .btn-green { background: #00ff88; color: #000; }
    .btn-red { background: #ff3355; color: #fff; }
    .btn-blue { background: #4488ff; color: #fff; }
    .btn-yellow { background: #ffd700; color: #000; }
    .btn-purple { background: #9945ff; color: #fff; }
    .btn-orange { background: #ff8800; color: #fff; }
    .btn-gray { background: #666; color: #fff; }
    .btn-row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    input { padding: 8px 12px; border-radius: 8px; border: 1px solid #333; background: #0a0a1a; color: #fff; font-size: 14px; }
    input:focus { outline: none; border-color: #00ff88; }
    .space { margin-top: 12px; }
    pre { background: #0a0a1a; padding: 12px; border-radius: 8px; font-size: 12px; overflow-x: auto; max-height: 300px; }
    .status { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 600; }
    .status-active { background: rgba(0,255,136,0.15); color: #00ff88; }
    .status-inactive { background: rgba(255,51,85,0.15); color: #ff3355; }
    .player-row { display: flex; align-items: center; gap: 8px; padding: 6px; background: rgba(255,255,255,0.03); border-radius: 6px; margin-bottom: 4px; }
    .player-row img { width: 28px; height: 28px; border-radius: 50%; }
  </style>
</head>
<body>
  <h1>🎮 Админ-панель — Угадай Футболиста</h1>
  <div id="statusBar" style="margin-bottom:16px"></div>
  
  <div class="grid">
    <!-- Game Control -->
    <div class="card">
      <h2>🎮 Управление</h2>
      <div class="btn-row">
        <button class="btn-green" onclick="control('start')">▶️ Начать</button>
        <button class="btn-red" onclick="control('stop')">⏹️ Стоп</button>
        <button class="btn-gray" onclick="control('reset')">🔄 Сброс</button>
      </div>
      <h2>📝 Вопросы</h2>
      <div class="btn-row">
        <button class="btn-blue" onclick="genQ('russian')">🇷🇺 Русский</button>
        <button class="btn-green" onclick="genQ('italian')">🇮🇹 Итальянский</button>
        <button class="btn-purple" onclick="genQ('other')">🌍 Мир</button>
      </div>
      <div class="btn-row">
        <button class="btn-yellow" onclick="genQ()">🤖 Случайный</button>
      </div>
      <h2>📋 Текущий вопрос</h2>
      <div class="btn-row">
        <button class="btn-yellow" onclick="control('reveal')">👁️ Показать ответ</button>
        <button class="btn-purple" onclick="control('next')">⏭️ Далее</button>
      </div>
      <div class="btn-row space">
        <button class="btn-orange" onclick="simulatePlayer()">🎲 Симуляция игрока</button>
      </div>
    </div>
    
    <!-- Current Question -->
    <div class="card">
      <h2>📋 Текущий вопрос</h2>
      <div id="questionInfo">Нет активного вопроса</div>
    </div>
    
    <!-- Chat & Leaderboard -->
    <div class="card">
      <h2>💬 Тестовый чат</h2>
      <input id="chatName" placeholder="Имя" style="width:100%;margin-bottom:8px">
      <div style="display:flex;gap:8px">
        <input id="chatMsg" placeholder="Сообщение" style="flex:1" onkeydown="if(event.key==='Enter')sendChat()">
        <button class="btn-green" onclick="sendChat()">→</button>
      </div>
      <div class="space">
        <h2>🏆 Сообщение победителя</h2>
        <div style="display:flex;gap:8px">
          <input id="winnerMsg" placeholder="Сообщение" style="flex:1">
          <button class="btn-yellow" onclick="sendWinnerMsg()">🏆</button>
        </div>
      </div>
      <div class="space">
        <h2>🏆 Лидерборд</h2>
        <div id="leaderboard">Пока нет игроков</div>
      </div>
    </div>
  </div>

  <script>
    async function api(path, body) {
      const res = await fetch('/api/' + path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: body ? JSON.stringify(body) : undefined,
      });
      return res.json();
    }
    
    async function control(action) {
      await api('game-control', { action });
      refresh();
    }
    
    async function genQ(cat) {
      await api('generate-question', cat ? { category: cat } : {});
      refresh();
    }
    
    async function sendChat() {
      const name = document.getElementById('chatName').value || 'User' + Math.floor(Math.random()*100);
      const msg = document.getElementById('chatMsg').value;
      if (!msg) return;
      await api('chat-message', { username: name, message: msg });
      document.getElementById('chatMsg').value = '';
      refresh();
    }
    
    async function sendWinnerMsg() {
      const msg = document.getElementById('winnerMsg').value;
      if (!msg) return;
      await api('winner-message', { message: msg });
      document.getElementById('winnerMsg').value = '';
      refresh();
    }
    
    async function simulatePlayer() {
      const names = ['Алексей', 'Мария', 'Дмитрий', 'Елена', 'Сергей', 'Анна', 'Иван'];
      const name = names[Math.floor(Math.random()*names.length)] + Math.floor(Math.random()*100);
      const state = await fetch('/api/game-state?admin=true').then(r=>r.json());
      const q = state.gameState?.currentQuestion;
      if (!q) { alert('Нет активного вопроса'); return; }
      const isCorrect = Math.random() > 0.5;
      await api('chat-message', { username: name, message: isCorrect ? q.answer : 'Не знаю' });
      refresh();
    }
    
    async function refresh() {
      const state = await fetch('/api/game-state?admin=true').then(r=>r.json());
      const gs = state.gameState;
      
      // Status bar
      document.getElementById('statusBar').innerHTML = gs.isGameActive
        ? '<span class="status status-active">🟢 Игра активна</span>'
        : '<span class="status status-inactive">🔴 Ожидание</span>';
      
      // Question info
      const qi = document.getElementById('questionInfo');
      if (gs.currentQuestion) {
        qi.innerHTML = `
          <div style="margin-bottom:8px;color:rgba(255,255,255,0.5);font-size:12px">${gs.currentQuestion.category}</div>
          <div style="font-size:18px;margin-bottom:12px">${gs.currentQuestion.text}</div>
          <div style="background:rgba(0,255,136,0.1);border:1px solid rgba(0,255,136,0.2);border-radius:8px;padding:12px">
            <div style="color:rgba(0,255,136,0.6);font-size:12px">Ответ:</div>
            <div style="font-size:24px;font-weight:700;color:#00ff88">${gs.currentQuestion.answer}</div>
          </div>
          <div style="margin-top:8px;font-size:12px;color:rgba(255,255,255,0.4)">Фаза: ${gs.phase}</div>
        `;
      } else {
        qi.innerHTML = 'Нет активного вопроса';
      }
      
      // Leaderboard
      const lb = document.getElementById('leaderboard');
      if (gs.topPlayers && gs.topPlayers.length > 0) {
        lb.innerHTML = gs.topPlayers.map((p,i) => `
          <div class="player-row">
            <span style="font-weight:700;color:${['#ffd700','#c0c0c0','#cd7f32'][i]||'#666'};width:20px">${i+1}</span>
            <img src="${p.avatarUrl}" alt="">
            <span style="flex:1">${p.username}</span>
            <span style="color:#00d4aa;font-weight:700">${p.score}</span>
          </div>
        `).join('');
      } else {
        lb.innerHTML = 'Пока нет игроков';
      }
    }
    
    refresh();
    setInterval(refresh, 3000);
  </script>
</body>
</html>
